<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
</head>
    <body>
    <h1>Tip Calculator</h1>
    <div id="inputs">

        <label>Bill Amount (₹)</label>
        <input type="number" id="bill" placeholder="Enter bill amount">
        <p id="bill-error"></p>

        <label>Tip Percentage</label>
        <button id ="btn10">10%</button>
        <button id ="btn15">15%</button>
        <button id="btn20">20%</button>
        <button id="btnCustom">Custom</button>


        <input type="number" id="tip" placeholder="Enter tip %">
        <p id="tip-error"></p>

        <label>Number of People</label>
        <input type="number" id="people" placeholder="Enter number of people">
        <p id="people-error"></p>

        <button id="reset">Reset</button>

    </div>

    <div id="outputs">
        <p>Bill Amount: ₹<span id="bill-amount">0</span></p>
        <p>Total Tip: ₹<span id="total-tip">0</span></p>
        <p>Grand Total: ₹<span id="grand-total">0</span></p>
        <p>Per Person: ₹<span id="per-person">0</span></p>
    </div>

<script src="script.js"></script>
    </body>
</html>
